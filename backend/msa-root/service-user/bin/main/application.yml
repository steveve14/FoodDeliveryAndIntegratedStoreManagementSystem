server:
  port: 8010

spring:
  profiles:
    active: local  # 개발 환경: H2 인메모리 DB 사용

  application:
    name: service-user  # Eureka에 등록될 이름

  datasource:
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
    url: ${DB_URL:jdbc:postgresql://localhost:6000/db_user}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    hikari:
      maximum-pool-size: ${DB_MAX_POOL_SIZE:10}

  # DB 구조 변경은 수동으로 처리합니다.
  flyway:
    enabled: false
    locations: classpath:db/migration

eureka:
  client:
    register-with-eureka: true   # Eureka에 등록
    fetch-registry: true         # 다른 서비스 주소 조회
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8100/eureka/}

# Spring gRPC 서버 설정 (Netty 독립 서버)
spring.grpc:
  server:
    port: 9010  # gRPC 전용 포트 (HTTP 8010과 완전히 분리)

token:
  secret: ${TOKEN_SECRET:c2lsdmVyLTI1Ni1iaXQtc2VjcmV0LWtleS1mb3ItjwtlbmNvZGluZy1leGFtcGxlCg==}

app:
  avatar:
    upload-dir: ${AVATAR_UPLOAD_DIR:uploads/avatars}
    public-base-url: ${AVATAR_PUBLIC_BASE_URL:/api/v1/users/avatars/}