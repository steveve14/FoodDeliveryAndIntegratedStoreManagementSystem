server:
  port: 8010

spring:
  profiles:
    active: local  # 개발 환경: H2 인메모리 DB 사용

  application:
    name: service-user  # Eureka에 등록될 이름

  datasource:
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
    url: ${DB_URL:jdbc:postgresql://localhost:5432/db_user}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    hikari:
      maximum-pool-size: ${DB_MAX_POOL_SIZE:10}

  # DB 구조 변경은 수동으로 처리합니다.
  flyway:
    enabled: false
    locations: classpath:db/migration

  # JPA 자동 DDL 비활성화(수동 마이그레이션 정책)
  jpa:
    hibernate:
      ddl-auto: none

eureka:
  client:
    register-with-eureka: true   # Eureka에 등록
    fetch-registry: true         # 다른 서비스 주소 조회
    service-url:
      defaultZone: http://localhost:8100/eureka/  # Discovery Service 주소

# gRPC 서버 설정
grpc:
  server:
    port: 9010  # gRPC 서버 포트