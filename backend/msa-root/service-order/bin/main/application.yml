server:
  port: 8040

spring:
  profiles:
    active: local  # 개발 환경

  application:
    name: service-order

  datasource:
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
    url: ${DB_URL:jdbc:postgresql://localhost:6000/db_order}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    hikari:
      maximum-pool-size: ${DB_MAX_POOL_SIZE:10}

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: false

spring.grpc:
  server:
    port: 9040
  client:
    channels:
      service-store:
        address: ${SERVICE_STORE_GRPC_ADDR:static://127.0.0.1:9020}
      service-delivery:
        address: ${SERVICE_DELIVERY_GRPC_ADDR:static://127.0.0.1:9050}

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8100/eureka/}

app:
  order:
    vip-threshold: ${ORDER_VIP_THRESHOLD:10}