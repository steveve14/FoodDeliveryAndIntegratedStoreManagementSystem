server:
  port: 8040

spring:
  profiles:
    active: local  # 개발 환경

  application:
    name: service-order

  datasource:
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
    url: ${DB_URL:jdbc:postgresql://localhost:5432/db_order}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    hikari:
      maximum-pool-size: ${DB_MAX_POOL_SIZE:10}

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: false

grpc:
  server:
    port: 9040
  client:
    service-store:
      address: static://localhost:9020
      negotiation-type: plaintext
    service-delivery:
      address: static://localhost:9050
      negotiation-type: plaintext

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8100/eureka/