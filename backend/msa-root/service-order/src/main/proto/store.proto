syntax = "proto3";

package com.example.store.grpc;

option java_multiple_files = true;
option java_package = "com.example.store.grpc";
option java_outer_classname = "StoreProto";

// Store 서비스 gRPC 정의 (service-order에서 클라이언트로 사용)
service StoreGrpcService {
    rpc GetStoreById(GetStoreByIdRequest) returns (StoreResponse);
    rpc CreateStore(CreateStoreRequest) returns (StoreResponse);
    rpc GetProductById(GetProductByIdRequest) returns (ProductResponse);
    rpc GetProductsByStoreId(GetProductsByStoreIdRequest) returns (ProductListResponse);
}

message GetStoreByIdRequest {
    string store_id = 1;
}

message CreateStoreRequest {
    string name = 1;
    string address = 2;
    string phone = 3;
    string category = 4;
    string status = 5;
    double latitude = 6;
    double longitude = 7;
    int64 min_order_amount = 8;
    double rating_avg = 9;
    string description = 10;
    string opening_hours = 11;
    string owner_id = 12;
}

message StoreResponse {
    bool found = 1;
    string store_id = 2;
    string name = 3;
    string address = 4;
    string phone = 5;
    string category = 6;
    string status = 7;
    double latitude = 8;
    double longitude = 9;
    int64 min_order_amount = 10;
    double rating_avg = 11;
    string description = 12;
    string opening_hours = 13;
    string owner_id = 14;
    int64 created_at = 15;
}

message GetProductByIdRequest {
    string product_id = 1;
}

message GetProductsByStoreIdRequest {
    string store_id = 1;
}

message ProductResponse {
    bool found = 1;
    string product_id = 2;
    string store_id = 3;
    string name = 4;
    string description = 5;
    int64 price = 6;
}

message ProductListResponse {
    repeated ProductResponse products = 1;
}
