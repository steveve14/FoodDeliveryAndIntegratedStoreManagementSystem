server:
  port: 7000

spring:
  profiles:
    active: local  # 개발 환경: H2 인메모리 DB 사용 (application-local.yml)
  
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: "여기에_구글_클라이언트_ID를_입력하세요.apps.googleusercontent.com"
  cloud:
    gateway:
      routes:
        # 1. 인증 서버 (로그인은 누구나 가능해야 하므로 필터 X)
        - id: service-auth
          uri: lb://SERVICE-AUTH
          predicates:
            - Path=/auth/**

        # 2. 회원 서비스 (로그인 체크 필요!)
        - id: service-user
          uri: lb://SERVICE-USER
          predicates:
            - Path=/users/**
          filters:
            - AuthorizationHeaderFilter # [적용] 위에서 만든 클래스 이름

        # 3. 주문 서비스 (로그인 체크 필요!)
        - id: service-order
          uri: lb://SERVICE-ORDER
          predicates:
            - Path=/orders/**
          filters:
            - AuthorizationHeaderFilter

  application:
    name: service-auth

  # 1. 데이터베이스 연결 (로그인 시 비밀번호 확인용)
  datasource:
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
    url: ${DB_URL:jdbc:postgresql://localhost:6000/db_user}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    hikari:
      maximum-pool-size: ${DB_MAX_POOL_SIZE:10}

  # Flyway 자동 마이그레이션 비활성화: DB 구조 변경은 수동으로 적용합니다.
  flyway:
    enabled: false

  # 3. Redis 연결 (Refresh Token 저장용)
  data:
    redis:
      host: localhost
      port: 6379

# Spring gRPC 설정 (최상위 레벨)
spring.grpc:
  server:
    port: 9000
  client:
    channels:
      service-user:
        address: static://127.0.0.1:9010  # IPv4 명시 — Windows에서 localhost가 ::1(IPv6)로 resolve되는 문제 방지

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8100/eureka/

# 4. JWT 시크릿 키 설정 (임의로 지정)
token:
  secret: "c2lsdmVyLTI1Ni1iaXQtc2VjcmV0LWtleS1mb3ItjwtlbmNvZGluZy1leGFtcGxlCg==" # Base64 인코딩된 긴 문자열 권장
  expiration_time: 3600000       # Access Token 만료 시간 (1시간)
  refresh_time: 1209600000       # Refresh Token 만료 시간 (2주)