server:
  port: 8000  # 클라이언트가 접근할 Gateway 포트

spring:
  profiles:
    active: local  # 개발 환경

  main:
    web-application-type: reactive

  web:
    resources:
      add-mappings: false

  application:
    name: service-gateway

  datasource:
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
    url: ${DB_URL:jdbc:postgresql://localhost:6000/db_gateway}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    hikari:
      maximum-pool-size: ${DB_MAX_POOL_SIZE:5}

  flyway:
    enabled: false

  cloud:
    gateway:
      # CORS 설정 — 프론트엔드 개발 서버에서의 접근 허용
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - ${GATEWAY_ALLOWED_ORIGIN_1:http://localhost:3000}
              - ${GATEWAY_ALLOWED_ORIGIN_2:http://localhost:3001}
              - ${GATEWAY_ALLOWED_ORIGIN_3:http://localhost:3002}
               - ${GATEWAY_ALLOWED_ORIGIN_4:http://localhost:3010}
               - ${GATEWAY_ALLOWED_ORIGIN_5:http://localhost:3100}
               - ${GATEWAY_ALLOWED_ORIGIN_6:http://localhost:3200}
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true

      # 라우트는 GatewayRouteConfig.java 에서 Java 코드로 정의합니다.

# Spring gRPC 클라이언트 설정
spring.grpc:
  client:
    channels:
      service-auth:
        address: ${SERVICE_AUTH_GRPC_ADDR:static://127.0.0.1:9000}

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8100/eureka/}

# JWT 시크릿 키 설정
token:
  secret: ${TOKEN_SECRET:}
  expiration_time: 3600000       # Access Token 만료 시간 (1시간)
  refresh_time: 1209600000       # Refresh Token 만료 시간 (2주)

# 로깅 설정
logging:
  level:
    org.springframework.cloud.gateway: WARN
    com.example.apigateway: INFO
    reactor.netty: INFO