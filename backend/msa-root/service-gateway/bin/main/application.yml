server:
  port: 8000  # 클라이언트가 접근할 Gateway 포트

spring:
  profiles:
    active: local  # 개발 환경

  main:
    web-application-type: reactive

  web:
    resources:
      add-mappings: false

  application:
    name: service-gateway

  datasource:
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
    url: ${DB_URL:jdbc:postgresql://localhost:6000/db_gateway}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    hikari:
      maximum-pool-size: ${DB_MAX_POOL_SIZE:5}

  flyway:
    enabled: false

  cloud:
    gateway:
      # CORS 설정 — 프론트엔드 개발 서버에서의 접근 허용
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:3001"
              - "http://localhost:3002"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true

      # 라우트는 GatewayRouteConfig.java 에서 Java 코드로 정의합니다.

# Spring gRPC 클라이언트 설정
spring.grpc:
  client:
    channels:
      service-auth:
        address: static://127.0.0.1:9000  # IPv4 명시 (Windows에서 localhost=::1 방지)

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8100/eureka/

# JWT 시크릿 키 설정
token:
  secret: "c2lsdmVyLTI1Ni1iaXQtc2VjcmV0LWtleS1mb3ItjwtlbmNvZGluZy1leGFtcGxlCg==" # Base64 인코딩된 긴 문자열 권장
  expiration_time: 3600000       # Access Token 만료 시간 (1시간)
  refresh_time: 1209600000       # Refresh Token 만료 시간 (2주)

# 로깅 설정
logging:
  level:
    org.springframework.cloud.gateway: WARN
    com.example.apigateway: INFO
    reactor.netty: INFO