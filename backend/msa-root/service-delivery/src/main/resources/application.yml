server:
  port: 8050

spring:
  profiles:
    active: local  # 개발 환경

  application:
    name: service-delivery

  datasource:
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
    url: ${DB_URL:jdbc:postgresql://localhost:6000/db_delivery}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    hikari:
      maximum-pool-size: ${DB_MAX_POOL_SIZE:10}

  # 자동 DDL 및 Flyway 자동 적용을 비활성화합니다. DB 구조 변경은 수동으로 적용하세요.
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: false

# Spring gRPC 서버 설정
spring.grpc:
  server:
    port: 9050

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8100/eureka/}

app:
  delivery:
    fixed-fee: ${DELIVERY_FIXED_FEE:3000}