spring:
  datasource:
    url: jdbc:h2:mem:deliverydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
    hikari:
      maximum-pool-size: 5

  # Spring Data JDBC 사용 — schema.sql 자동 실행 (embedded DB)
  sql:
    init:
      mode: embedded

  flyway:
    enabled: false

  h2:
    console:
      enabled: true
      path: /h2-console
