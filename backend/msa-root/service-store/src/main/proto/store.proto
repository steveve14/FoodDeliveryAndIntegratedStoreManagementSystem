syntax = "proto3";

package com.example.store.grpc;

option java_multiple_files = true;
option java_package = "com.example.store.grpc";
option java_outer_classname = "StoreProto";

// Store 서비스 gRPC 정의
service StoreGrpcService {
    // 매장 ID로 조회
    rpc GetStoreById(GetStoreByIdRequest) returns (StoreResponse);
    
    // 매장 생성
    rpc CreateStore(CreateStoreRequest) returns (StoreResponse);
    
    // 상품 ID로 조회
    rpc GetProductById(GetProductByIdRequest) returns (ProductResponse);
    
    // 매장의 상품 목록 조회
    rpc GetProductsByStoreId(GetProductsByStoreIdRequest) returns (ProductListResponse);
}

message GetStoreByIdRequest {
    int64 store_id = 1;
}

message CreateStoreRequest {
    string name = 1;
    string address = 2;
    string phone = 3;
}

message StoreResponse {
    bool found = 1;
    int64 store_id = 2;
    string name = 3;
    string address = 4;
    string phone = 5;
    int64 created_at = 6;
}

message GetProductByIdRequest {
    int64 product_id = 1;
}

message GetProductsByStoreIdRequest {
    int64 store_id = 1;
}

message ProductResponse {
    bool found = 1;
    int64 product_id = 2;
    int64 store_id = 3;
    string name = 4;
    string description = 5;
    int64 price = 6;
}

message ProductListResponse {
    repeated ProductResponse products = 1;
}
