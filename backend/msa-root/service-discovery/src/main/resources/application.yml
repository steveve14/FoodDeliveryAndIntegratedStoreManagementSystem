server:
  port: 8100

spring:
  application:
    name: discovery-service

  datasource:
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
    url: ${DB_URL:jdbc:postgresql://localhost:6000/db_discovery}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    hikari:
      maximum-pool-size: ${DB_MAX_POOL_SIZE:5}

  flyway:
    enabled: false

eureka:
  instance:
    hostname: localhost
  client:
    register-with-eureka: false  # 서버 자신이므로 등록하지 않음
    fetch-registry: false        # 서버 자신이므로 목록을 가져오지 않음
    service-url:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/